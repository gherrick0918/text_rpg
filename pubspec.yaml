name: text_rpg
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.32.0
  sqlite3: ^3.1.6
  path_provider: ^2.1.5
  path: ^1.9.0
  riverpod: ^3.2.1
  flutter_riverpod: ^3.2.1
  google_fonts: ^8.0.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.0
  build_runner: ^2.12.2

flutter:
  uses-material-design: true

  # ADDED: bundle the pre-seeded content database with the app.
  # The file must exist at <project root>/assets/content.db
  assets:
    - assets/content.db
